spring.application.name=community-compass-java
# Java service runs on 8080 (Python API is on 8000, frontend on 5173).
server.port=8080
# Override in prod with the deployed frontend origin.
app.frontend-url=http://localhost:5173

# ── Database (kindConnect dashboard is JPA-backed) ──────────────────────────
# In-memory H2 in PostgreSQL-compatibility mode so the service is self-contained
# (kindConnect originally targeted PostgreSQL). Swap for a real Postgres URL in prod.
spring.datasource.url=jdbc:h2:mem:communitycompass;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
# kindConnect's data.sql is PostgreSQL-flavored; kept as kindconnect-data.sql for the
# team but not auto-run on H2. Set to "always" + provide an H2-compatible seed to enable.
spring.sql.init.mode=never

# ── kindConnect SmartChat (Ollama) — falls back gracefully if unreachable ───
ollama.api.url=http://localhost:11434/api/generate
ollama.model=gemma2:2b
