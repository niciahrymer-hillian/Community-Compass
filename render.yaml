# Render Blueprint for Community Compass
# Docs: https://render.com/docs/blueprint-spec
#
# This provisions the platform on Render: a Postgres database, a shared secret
# group, and the Python FastAPI service. The Java service and React frontend are
# stubbed below and get uncommented in their own PRs once those dirs exist.
#
# Secrets: anything with `sync: false` is NOT stored in git — Render prompts you
# for the value on first deploy (or set it in the dashboard / Env Group).

databases:
  - name: community-compass-db
    databaseName: community_compass
    plan: free
    region: ohio

envVarGroups:
  # Shared secrets attached to every backend service so keys live in one place.
  - name: community-compass-shared
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: AI_PROVIDER
        value: groq
      - key: GROQ_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false

services:
  # ── Python FastAPI (HomeMatch map/housing + Future-Path caseworker) ────────
  - type: web
    name: community-compass-api-py
    runtime: python
    rootDir: backend
    plan: free
    region: ohio
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - fromGroup: community-compass-shared
      - key: DATABASE_URL
        fromDatabase:
          name: community-compass-db
          property: connectionString
      - key: FRONTEND_URL
        sync: false

  # ── Java Spring Boot (kindConnect dashboard + newsfeed) ────────────────────
  # Uncomment once java-service/ is scaffolded from kindConnect.
  # - type: web
  #   name: community-compass-api-java
